  moneybag: "Add a moneybag emblem above the lettering where the pendant bail normally sits. Match the style, pave pattern, edging, and proportions shown in the second reference image. The moneybag should be around 15-30% of the size of the main lettering and should feel naturally integrated into the pendant. Attach it using two short, sturdy support bridges positioned close together on the centerline, not thin gemstone prongs."

colorSchemes:
  single_tone: "Use a {{PRIMARY_METAL_LABEL}} color scheme throughout the pendant. Apply {{PRIMARY_METAL_LABEL}} consistently to the visible metal surfaces, rims, edges, sides, backs, trims, prongs, and support areas while keeping all major top-facing design surfaces heavily diamond flooded."
  two_tone: "Use a two tone {{PRIMARY_METAL_LABEL}} and {{SECONDARY_METAL_LABEL}} color scheme throughout the pendant. The top facing letter surfaces and emblem faces beneath the diamonds should use {{SECONDARY_METAL_LABEL}}, while the rims, edges, sides, and backs should use {{PRIMARY_METAL_LABEL}}. Apply this mapping consistently across the entire pendant."
