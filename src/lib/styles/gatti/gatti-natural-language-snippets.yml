emblems:
  none: "Do not add an emblem above the lettering. Keep the pendant bail centered and naturally integrated above the name."
  crown: "Add a crown emblem above the lettering where the pendant bail normally sits. Match the style, pave pattern, edging, and proportions shown in the second reference image. The crown should be around 15-30% of the size of the main lettering and should feel naturally integrated into the pendant. Attach it using two short, sturdy support bridges positioned close together on the centerline, not thin gemstone prongs."
  heart: "Add a heart emblem above the lettering where the pendant bail normally sits. Match the style, pave pattern, edging, and proportions shown in the second reference image. The heart should be around 15-30% of the size of the main lettering and should feel naturally integrated into the pendant. Attach it using two short, sturdy support bridges positioned close together on the centerline, not thin gemstone prongs."
