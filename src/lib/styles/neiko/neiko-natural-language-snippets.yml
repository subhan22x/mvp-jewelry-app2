emblems:
  none: "Do not add any emblem above the lettering. Keep the bail centered above the name, naturally integrated into the pendant with realistic jewelry construction."
  crown: "Add a crown emblem above the lettering where the bail for the chain sits. The emblem should closely match the style shown in the second reference image. Keep the emblem around 15–30% of the size of the main lettering. It should feel structurally integrated using two short, sturdy center support bridges, not thin prongs. Keep it centered with realistic jewelry construction."
  heart: "Add a heart emblem above the lettering where the bail for the chain sits. The emblem should closely match the style shown in the second reference image. Keep the emblem around 15–30% of the size of the main lettering. It should feel structurally integrated using two short, sturdy center support bridges, not thin prongs. Keep it centered with realistic jewelry construction."
  spade: "Add a spade emblem above the lettering where the bail for the chain sits. The emblem should closely match the style shown in the second reference image. Keep the emblem around 15–30% of the size of the main lettering. It should feel structurally integrated using two short, sturdy center support bridges, not thin prongs. Keep it centered with realistic jewelry construction."
  butterfly: "Add a butterfly emblem above the lettering where the bail for the chain sits. The emblem should closely match the style shown in the second reference image. Keep the emblem around 15–30% of the size of the main lettering. It should feel structurally integrated using two short, sturdy center support bridges, not thin prongs. Keep it centered with realistic jewelry construction."
  moneybag: "Add a moneybag emblem above the lettering where the bail for the chain normally sits — this is where the ring for the pendant chain goes. The emblem should closely match the style shown in the second reference image. Keep the emblem around 15–30% of the size of the main lettering, structurally integrated using two short, sturdy center support bridges, not thin prongs. Keep it centered above the name with realistic jewelry construction."

colorSchemes:
  single_tone: "Change the color of the entire jewelry pendant to {{PRIMARY_METAL_LABEL}}. Apply this consistently across all metal surfaces — rims, edges, sides, backing, trims, prongs, and support areas — while keeping the diamond-facing surfaces fully paved."
  two_tone: "Change the color of the entire jewelry pendant to two-tone {{PRIMARY_METAL_LABEL}} and {{SECONDARY_METAL_LABEL}}. The diamond-facing surfaces and front letter faces should use {{SECONDARY_METAL_LABEL}} beneath the diamonds, while the rims, edges, sides, and structural backing use {{PRIMARY_METAL_LABEL}}. Keep this mapping consistent across both the lettering and any emblem."
