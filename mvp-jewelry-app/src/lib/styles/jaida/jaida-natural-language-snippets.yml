colorSchemes:
  single_tone: "Use a {{PRIMARY_METAL_LABEL}} color scheme consistently across the entire pendant. Apply {{PRIMARY_METAL_LABEL}} to the visible metal surfaces, rims, edges, sides, backing, trims, prongs, and support areas while keeping the diamond-facing surfaces fully paved and cohesive."
  two_tone: "Use a two tone {{PRIMARY_METAL_LABEL}} and {{SECONDARY_METAL_LABEL}} color scheme consistently across the entire pendant. The diamond facing surfaces and front letter faces should use {{SECONDARY_METAL_LABEL}} beneath the diamonds, while the rims, edges, and structural backing should use {{PRIMARY_METAL_LABEL}}. Keep this mapping consistent across both the lettering and emblem."
