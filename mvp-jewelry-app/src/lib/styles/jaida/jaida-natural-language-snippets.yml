emblems:
  none: "Do not add an emblem above the lettering. Keep the pendant bail centered above the name and naturally integrated into the pendant with realistic jewelry construction."
  crown: "Add a crown emblem above the lettering where the pendant bail normally sits. The emblem should closely match the style, edging, proportions, and pave pattern shown in the second reference image. Keep the emblem around 15-30% of the size of the main lettering. It should feel structurally integrated into the pendant using two short, sturdy center support bridges, not thin prongs. Make sure the emblem hangs naturally and remains centered with realistic jewelry construction."
