services:
  - type: web
    name: mvp-jewelry-app
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run prisma:generate && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: GENERATED_IMAGE_DIR
        value: /var/data/generated
      - key: VIDEO_ACCESS_CODE
        value: ID8
      - key: VIDEO_DURATION_SECONDS
        value: "7"
      - key: GOOGLE_API_KEY
        sync: false
      - key: WAVESPEED_API_KEY
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_BASE_URL
        sync: false
    disk:
      name: jewelry-data
      mountPath: /var/data
      sizeGB: 10
