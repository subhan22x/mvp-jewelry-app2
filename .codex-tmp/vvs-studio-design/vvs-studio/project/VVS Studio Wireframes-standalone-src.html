<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="ext-resource-dependency" content="uploads/b2378fd04f254a85a986908cc613d661.png" data-resource-id="logoImg" />
<meta name="ext-resource-dependency" content="uploads/topview.jpg" data-resource-id="topView" />
<meta name="ext-resource-dependency" content="uploads/bottomleftview.jpg" data-resource-id="leftView" />
<meta name="ext-resource-dependency" content="uploads/bottomrightview.jpg" data-resource-id="rightView" />
<title>VVS Studio — Layout Wireframes</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,400;0,600;0,700;1,400;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0e0e10; font-family: 'DM Sans', sans-serif; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100% { opacity:.3; transform:scale(.9); } 50% { opacity:1; transform:scale(1.1); } }
  @keyframes progbar { from { width:0 } to { width:65% } }
  @keyframes progvid { from { width:0 } to { width:42% } }
</style>

<template id="__bundler_thumbnail" data-bg-color="#16161a">
  <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
    <rect x="38" y="8" width="44" height="64" rx="7" fill="#1e1e24" stroke="#35353d" stroke-width="1.5"/>
    <rect x="44" y="18" width="32" height="3" rx="1.5" fill="#D4A853" opacity="0.9"/>
    <rect x="44" y="25" width="20" height="2" rx="1" fill="#606068"/>
    <rect x="44" y="31" width="32" height="10" rx="2" fill="#252530"/>
    <rect x="44" y="45" width="32" height="10" rx="2" fill="#252530"/>
    <rect x="44" y="59" width="32" height="6" rx="3" fill="#D4A853" opacity="0.8"/>
    <text x="16" y="46" font-size="18" fill="#D4A853" font-family="serif">✦</text>
  </svg>
</template>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;
// Standalone resource map — populated by bundler at runtime
const R = window.__resources || {};
const _top   = R.topView  || "uploads/topview.jpg";
const _left  = R.leftView || "uploads/bottomleftview.jpg";
const _right = R.rightView|| "uploads/bottomrightview.jpg";
const _logo  = R.logoImg  || "uploads/b2378fd04f254a85a986908cc613d661.png";

// ── tokens ────────────────────────────────────────────────────────
const G = '#D4A853';
const BG  = '#16161a';
const BG2 = '#1e1e24';
const BD  = '#35353d';
const TX  = '#c0c0c8';
const DIM = '#606068';
const WH  = '#eaeaf0';
const CAV = "'Figtree', sans-serif";
const MON = "'DM Sans', sans-serif";

// ── Logo ─────────────────────────────────────────────────────────
const Logo = () => (
  <img src={_logo}
    style={{ height:30, objectFit:'contain', mixBlendMode:'lighten', opacity:0.92 }}
    alt="VVS Studio" />
);
const L = ({ sz=15, gold, dim, bold, mono, center, italic, style={}, children }) => {
  const isHeading = bold && sz >= 18;
  return (
    <span style={{
      fontFamily: isHeading ? CAV : MON,
      fontSize: sz,
      color: gold ? G : dim ? DIM : WH,
      fontWeight: bold ? (isHeading ? 700 : 600) : 400,
      fontStyle: 'normal',
      textAlign: center ? 'center' : undefined,
      display: center ? 'block' : undefined,
      lineHeight: 1.3,
      letterSpacing: isHeading ? '-0.01em' : mono ? undefined : '0.01em',
      ...style
    }}>{children}</span>
  );
};

const Box = ({ w, h, dashed, gold, r=6, style={}, children }) => (
  <div style={{ width: w, height: h, flexShrink: 0,
    border: `${gold ? 2 : 1.5}px ${dashed ? 'dashed' : 'solid'} ${gold ? G : BD}`,
    borderRadius: r, background: BG2, overflow: 'hidden',
    display: 'flex', alignItems: 'center', justifyContent: 'center', position: 'relative', ...style
  }}>{children}</div>
);

const Pill = ({ label, active, small }) => (
  <div style={{ padding: small ? '3px 9px' : '5px 13px', borderRadius: 20, flexShrink: 0, cursor: 'pointer',
    border: `1.5px solid ${active ? G : BD}`, background: active ? G + '22' : BG }}>
    <L sz={small ? 11 : 13} gold={active}>{label}</L>
  </div>
);

const Btn = ({ label, primary, full, h=44, style={} }) => (
  <div style={{ height: h, width: full ? '100%' : undefined,
    border: `1.5px solid ${primary ? G : BD}`, borderRadius: 8,
    background: primary ? G + '1a' : BG2, cursor: 'pointer',
    display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, ...style }}>
    <L sz={14} gold={primary} bold={primary}>{label}</L>
  </div>
);

const FInput = ({ label, placeholder }) => (
  <div style={{ display: 'flex', flexDirection: 'column', gap: 3 }}>
    {label && <L sz={10} dim mono>{label}</L>}
    <div style={{ height: 32, border: `1px solid ${BD}`, borderRadius: 5, background: BG,
      padding: '0 9px', display: 'flex', alignItems: 'center' }}>
      <L sz={12} dim>{placeholder}</L>
    </div>
  </div>
);

const FSelect = ({ label, value }) => (
  <div style={{ display: 'flex', flexDirection: 'column', gap: 3 }}>
    {label && <L sz={10} dim mono>{label}</L>}
    <div style={{ height: 32, border: `1px solid ${BD}`, borderRadius: 5, background: BG,
      padding: '0 9px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
      <L sz={12}>{value}</L><L sz={11} dim>▾</L>
    </div>
  </div>
);

const Steps = ({ n, cur }) => (
  <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
    {Array.from({ length: n }).map((_, i) => (
      <React.Fragment key={i}>
        <div style={{ width: i === cur ? 28 : 8, height: 8, borderRadius: 4,
          background: i === cur ? G : i < cur ? G + '55' : BD }} />
        {i < n - 1 && <div style={{ width: 12, height: 1, background: BD }} />}
      </React.Fragment>
    ))}
  </div>
);

const UpZone = ({ src, label, sub, active, w=108, h=108 }) => (
  <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 5, cursor: 'pointer' }}>
    <div style={{ width: w, height: h, border: `2px dashed ${active ? G : BD}`, borderRadius: 10,
      overflow: 'hidden', background: BG }}>
      <img src={src} style={{ width: '100%', height: '100%', objectFit: 'cover', opacity: active ? 0.9 : 0.55 }} alt={label} />
    </div>
    <L sz={12} gold={active}>{label}</L>
    <L sz={10} dim>{sub}</L>
  </div>
);

const Swatch = ({ color, label, active }) => (
  <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4, cursor: 'pointer' }}>
    <div style={{ width: 48, height: 48, borderRadius: 8, background: color,
      border: `2px solid ${active ? G : BD}` }} />
    <L sz={10} gold={active} dim={!active}>{label}</L>
  </div>
);

// ── A: LINEAR WIZARD ─────────────────────────────────────────────

// Style video card — portrait rectangle
const StyleCard = ({ idx, label, active, onClick }) => (
  <div onClick={onClick} style={{ flex:1, display:'flex', flexDirection:'column', gap:5, cursor:'pointer' }}>
    <div style={{ height:100, border:`2px solid ${active ? G : BD}`, borderRadius:8,
      background:BG2, position:'relative', overflow:'hidden' }}>
      <svg width="100%" height="100%" style={{ position:'absolute', inset:0 }}>
        <defs>
          <pattern id={`sc${idx}`} x="0" y="0" width="14" height="14"
            patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
            <line x1="0" y1="0" x2="0" y2="14" stroke="#252530" strokeWidth="1.5"/>
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill={`url(#sc${idx})`} />
      </svg>
      <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center' }}>
        <div style={{ width:22, height:22, borderRadius:'50%',
          background: active ? G+'55' : BD+'88',
          display:'flex', alignItems:'center', justifyContent:'center' }}>
          <L sz={9} style={{ marginLeft:2, color: active ? G : DIM }}>▶</L>
        </div>
      </div>
      {active && <div style={{ position:'absolute', top:5, right:5, width:14, height:14,
        borderRadius:'50%', background:G,
        display:'flex', alignItems:'center', justifyContent:'center' }}>
        <L sz={8} style={{ color:'#000' }}>✓</L>
      </div>}
    </div>
    <L sz={10} gold={active} dim={!active} center>{label}</L>
  </div>
);

const A1 = () => {
  const [style, setStyle] = React.useState(0);
  return (
  <div style={{ width:390, height:780, background:BG, display:'flex', flexDirection:'column', padding:'22px 22px 18px', gap:14 }}>
    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
      <Logo />
      <Box w={28} h={28} r={14}><L sz={11} dim>✕</L></Box>
    </div>
    <div style={{ display:'flex', flexDirection:'column', gap:4 }}>
      <Steps n={4} cur={0} />
      <div style={{ display:'flex', gap:14 }}>
        {['Piece','Capture','Details','Theme'].map((s,i) =>
          <L key={s} sz={11} gold={i===0} dim={i!==0}>{s}</L>)}
      </div>
    </div>

    {/* Capture */}
    <div style={{ display:'flex', flexDirection:'column', gap:9 }}>
      <L sz={18} bold>Capture 3 Angles</L>
      <L sz={12} dim style={{ lineHeight:1.5 }}>Flat surface, even lighting. Tap each zone to upload.</L>
      <div style={{ display:'flex', justifyContent:'space-around' }}>
        <UpZone src={_top} label="Top View" sub="Straight down" active w={96} h={96} />
        <UpZone src={_left} label="Left Angle" sub="45° left" w={96} h={96} />
        <UpZone src={_right} label="Right Angle" sub="45° right" w={96} h={96} />
      </div>
    </div>

    <div style={{ height:1, background:BD }} />

    {/* Choose Style */}
    <div style={{ display:'flex', flexDirection:'column', gap:9 }}>
      <L sz={18} bold>Choose Style</L>
      <L sz={12} dim>Pick a visual theme for your studio asset</L>
      <div style={{ display:'flex', gap:7 }}>
        {['Dark','Marble','Street','Velvet','Ice'].map((s,i) => (
          <StyleCard key={s} idx={i} label={s} active={style===i} onClick={() => setStyle(i)} />
        ))}
      </div>
    </div>

    <div style={{ flex:1 }} />
    <Btn label="NEXT  →" primary full h={48} />
    <L sz={11} dim center>Step 1 of 4</L>
  </div>
  );
};

const A2 = () => (
  <div style={{ width: 390, height: 780, background: BG, display: 'flex', flexDirection: 'column', padding: '28px 22px 22px', gap: 16 }}>
    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
      <Logo />
      <Box w={28} h={28} r={14}><L sz={11} dim>✕</L></Box>
    </div>
    <div style={{ display: 'flex', flexDirection: 'column', gap: 5 }}>
      <Steps n={4} cur={1} />
      <div style={{ display: 'flex', gap: 14 }}>
        {['Piece', 'Capture', 'Details', 'Theme'].map((s, i) =>
          <L key={s} sz={11} gold={i===2} dim={i!==2}>{s}</L>)}
      </div>
    </div>
    {/* Select Piece — moved from screen 01 */}
  <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
    <L sz={20} bold>Select Piece</L>
    <div style={{ display:'flex', gap:6, flexWrap:'nowrap' }}>
      {['Pendant','Ring','Chainz','Grills','Band'].map((p,i) =>
        <Pill key={p} label={p} active={i===0} small />)}
    </div>
  </div>
  <div style={{ height:1, background:BD }} />
  <L sz={20} bold>Piece Details</L>
    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 11 }}>
      <FSelect label="METAL TYPE" value="14K Yellow Gold" />
      <FSelect label="DIAMOND WT." value="1.2ct total" />
      <FInput label="ENGRAVING / TEXT" placeholder="e.g.  LOYALTY" />
      <FInput label="PRICE" placeholder="$4,500" />
    </div>
    <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
      <L sz={11} dim mono>STONE SETTING</L>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 7 }}>
        {['Micro Pavé','Flooded','Baguette','Invisible'].map((s,i) =>
          <Pill key={s} label={s} active={i===0} />)}
      </div>
    </div>
    <div style={{ display: 'flex', flexDirection: 'column', gap: 7 }}>
      <L sz={11} dim mono>KARAT / ALLOY</L>
      <div style={{ display: 'flex', gap: 7 }}>
        {['10K','14K','18K','Plat'].map((k,i) =>
          <Pill key={k} label={k} active={i===1} small />)}
      </div>
    </div>
    <div style={{ flex: 1 }} />
    <div style={{ display: 'flex', gap: 10 }}>
      <Btn label="← Back" style={{ flex: 1 }} />
      <Btn label="NEXT  →" primary style={{ flex: 2 }} />
    </div>
    <L sz={11} dim center>Step 2 of 4</L>
  </div>
);

// Aspect ratio visual picker card
const RatioCard = ({ w, h, label, sub, active, onClick }) => (
  <div onClick={onClick} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center',
    gap:8, padding:'10px 6px 10px', cursor:'pointer', borderRadius:9,
    border:`1.5px solid ${active ? G : BD}`, background: active ? G+'12' : BG,
    transition:'border-color 0.15s' }}>
    <div style={{ display:'flex', alignItems:'center', justifyContent:'center', height:52 }}>
      <div style={{ width:w, height:h, border:`2px solid ${active ? G : '#555'}`,
        borderRadius:3, background: active ? G+'22' : BG2,
        display:'flex', alignItems:'center', justifyContent:'center' }}>
        {active && <div style={{ width: Math.round(w*0.4), height: Math.round(h*0.4),
          borderRadius:2, background: G+'55' }} />}
      </div>
    </div>
    <L sz={13} gold={active} bold={active} center>{label}</L>
    <L sz={10} dim center>{sub}</L>
  </div>
);

const A3 = () => {
  const [ratio, setRatio] = useState(0);
  const [mood, setMood] = useState(0);

  const ratios = [
    { label:'Square', sub:'1:1  Instagram Post', pw:46, ph:46 },
    { label:'Expanded', sub:'4:5  Instagram Feed', pw:38, ph:48 },
    { label:'Story', sub:'9:16  Reels / TikTok', pw:29, ph:52 },
  ];

  // preview box dims
  const previewAspects = [
    { w:'100%', h:170 },
    { w:'80%',  h:180 },
    { w:'55%',  h:175 },
  ];
  const pa = previewAspects[ratio];

  return (
    <div style={{ width:390, height:780, background:BG, display:'flex', flexDirection:'column', padding:'28px 22px 22px', gap:14 }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <Logo />
        <Box w={28} h={28} r={14}><L sz={11} dim>✕</L></Box>
      </div>
      <Steps n={4} cur={3} />
      <L sz={24} bold>Choose Aesthetic</L>

      {/* Mood */}
      <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
        <L sz={11} dim mono>MOOD</L>
        <div style={{ display:'flex', flexWrap:'wrap', gap:7 }}>
          {['Luxury','Street','Editorial','Minimal'].map((m,i) => (
            <div key={m} onClick={() => setMood(i)}>
              <Pill label={m} active={mood===i} />
            </div>
          ))}
        </div>
      </div>

      {/* Aspect ratio picker */}
      <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
        <L sz={11} dim mono>ASPECT RATIO</L>
        <div style={{ display:'flex', gap:8 }}>
          {ratios.map((r,i) => (
            <RatioCard key={r.label} w={r.pw} h={r.ph}
              label={r.label} sub={r.sub}
              active={ratio===i} onClick={() => setRatio(i)} />
          ))}
        </div>
      </div>

      <div style={{ flex:1 }} />
      <Btn label="✦  GENERATE STUDIO ASSET" primary full h={52} />
      <div style={{ display:'flex', gap:10 }}>
        <Btn label="← Back" style={{ flex:1, height:36 }} />
        <L sz={11} dim style={{ display:'flex', alignItems:'center' }}>Step 4 of 4</L>
      </div>
    </div>
  );
};

// ── A4: IMAGE LOADING ────────────────────────────────────────────
const LoadStep = ({ label, done, active }) => (
  <div style={{ display:'flex', alignItems:'center', gap:10 }}>
    <div style={{ width:18, height:18, borderRadius:'50%', flexShrink:0,
      background: done ? G : active ? G+'33' : BD,
      border: active ? `2px solid ${G}` : 'none',
      display:'flex', alignItems:'center', justifyContent:'center' }}>
      {done && <L sz={10} style={{ color:'#000' }}>✓</L>}
      {active && <div style={{ width:7, height:7, borderRadius:'50%', background:G, animation:'pulse 1.4s ease-in-out infinite' }} />}
    </div>
    <L sz={13} gold={active} dim={!done && !active}>{label}</L>
  </div>
);

const A4 = () => (
  <div style={{ width:390, height:780, background:BG, display:'flex', flexDirection:'column',
    alignItems:'center', padding:'28px 22px 28px', position:'relative' }}>
    <div style={{ position:'absolute', top:28, left:22, right:22, display:'flex', justifyContent:'space-between' }}>
      <Logo />
    </div>
    <div style={{ flex:1 }} />
    {/* Spinner */}
    <div style={{ position:'relative', width:88, height:88, marginBottom:28 }}>
      <div style={{ position:'absolute', inset:0, borderRadius:'50%', border:`3px solid ${BD}` }} />
      <div style={{ position:'absolute', inset:0, borderRadius:'50%', border:`3px solid transparent`,
        borderTopColor:G, animation:'spin 1s linear infinite' }} />
      <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center' }}>
        <L sz={28} gold>✦</L>
      </div>
    </div>
    <L sz={24} bold center>Generating...</L>
    <L sz={13} dim center style={{ marginTop:6 }}>Creating your studio asset</L>

    {/* Progress bar */}
    <div style={{ width:'100%', marginTop:28, display:'flex', flexDirection:'column', gap:7 }}>
      <div style={{ height:4, background:BD, borderRadius:2, overflow:'hidden' }}>
        <div style={{ height:'100%', width:0, background:G, borderRadius:2,
          animation:'progbar 3s ease-out forwards' }} />
      </div>
      <div style={{ display:'flex', justifyContent:'space-between' }}>
        <L sz={11} dim>Processing images</L>
        <L sz={11} gold>65%</L>
      </div>
    </div>

    {/* Steps */}
    <div style={{ width:'100%', marginTop:24, display:'flex', flexDirection:'column', gap:13 }}>
      <LoadStep label="Analyzing jewelry geometry" done />
      <LoadStep label="Removing background" done />
      <LoadStep label="Applying Noir theme" active />
      <LoadStep label="Compositing studio lighting" />
    </div>
    <div style={{ flex:1 }} />
    <L sz={11} dim center>Usually takes 10–20 seconds</L>
  </div>
);

// ── A5: IMAGE RESULT ─────────────────────────────────────────────
const A5 = () => (
  <div style={{ width:390, height:780, background:BG, display:'flex', flexDirection:'column', overflow:'hidden' }}>
    {/* Header */}
    <div style={{ height:52, display:'flex', alignItems:'center', padding:'0 22px',
      justifyContent:'space-between', flexShrink:0 }}>
      <L sz={13} dim>← Back</L>
      <Logo />
      <L sz={13} style={{ color:G }}>↑ Share</L>
    </div>

    {/* Edit + Regenerate — safe zone up top, away from thumb */}
    <div style={{ display:'flex', gap:8, padding:'0 22px 12px', flexShrink:0 }}>
      <Btn label="✎  Edit Details" style={{ flex:1, height:36 }} />
      <Btn label="↺  Regenerate" style={{ flex:1, height:36 }} />
    </div>

    <div style={{ height:1, background:BD, margin:'0 22px', flexShrink:0 }} />

    {/* Generated image — square 1:1 */}
    <div style={{ margin:'12px 22px 0', aspectRatio:'1/1', border:`1px solid ${BD}`, borderRadius:14,
      position:'relative', overflow:'hidden', background:BG2, flexShrink:0 }}>
      <svg width="100%" height="100%" style={{ position:'absolute', inset:0 }}>
        <defs>
          <pattern id="hatchA5" x="0" y="0" width="22" height="22"
            patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
            <line x1="0" y1="0" x2="0" y2="22" stroke="#252530" strokeWidth="1.5"/>
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#hatchA5)" />
      </svg>
      <div style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column',
        alignItems:'center', justifyContent:'center', gap:8 }}>
        <L sz={42} gold>✦</L>
        <L sz={12} dim>Noir  ·  Pendant  ·  14K YG</L>
      </div>
      {/* Info overlay */}
      <div style={{ position:'absolute', bottom:12, left:12, right:12,
        background:BG2+'ee', border:`1px solid ${BD}`, borderRadius:10, padding:'8px 12px' }}>
        <L sz={14} bold>LOYALTY PENDANT</L>
        <div style={{ display:'flex', gap:10, marginTop:3 }}>
          <L sz={11} dim>14K YG  ·  Micro Pavé  ·  1.2ct</L>
          <L sz={12} gold>$4,500</L>
        </div>
      </div>
    </div>

    <div style={{ flex:1 }} />

    {/* Bottom — only the primary destructive/action CTA */}
    <div style={{ padding:'12px 22px 28px', display:'flex', flexDirection:'column', gap:10 }}>
      <Btn label="↓  Save to Camera Roll" full h={44} />
      <div style={{ height:58, background:G, borderRadius:12, cursor:'pointer',
        display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:2 }}>
        <L sz={16} bold style={{ color:'#000' }}>⬡  Generate Video Reel</L>
        <L sz={11} style={{ color:'#000', opacity:0.55 }}>Motion reel from this image</L>
      </div>
    </div>
  </div>
